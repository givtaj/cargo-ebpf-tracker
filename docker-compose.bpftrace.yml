services:
  bpftrace:
    build:
      context: .
      dockerfile: docker/bpftrace-rust.Dockerfile
    privileged: true
    pid: host
    working_dir: /workspace
    volumes:
      - ${PROJECT_DIR:?set PROJECT_DIR}:/workspace
      - cargo-target-cache:/cargo-target
      - ./probes:/probes:ro

volumes:
  cargo-target-cache:
